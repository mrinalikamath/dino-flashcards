<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dino Flash Cards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      height: 100dvh;
      background: #e4e0d8;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
    }

    .stack-wrapper {
      position: relative;
      /* width drives size; capped by viewport width AND by viewport height via aspect ratio */
      width: min(
        560px,
        calc(100vw - 48px),
        calc((100svh - 80px) * 560 / 415)
      );
      aspect-ratio: 560 / 415;
      flex-shrink: 0;
    }

    /* All 4 card scenes share the same footprint */
    .scene {
      position: absolute;
      inset: 0;
      perspective: 900px;
      cursor: pointer;
    }

    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.65s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .card.flipped { transform: rotateY(180deg); }

    .face {
      position: absolute;
      inset: 0;
      border-radius: 36px;
      backface-visibility: hidden;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    }

    /* Front face */
    .front {
      background: #1c1917;
      display: flex;
      flex-direction: column;
      padding: 16px 25px 25px;
      gap: 12px;
    }

    .card-top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      padding: 6px 0;
    }

    .card-icon { font-size: 1.4rem; line-height: 1; opacity: 0.9; }

    .pronounce-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #c49a4a;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.2s;
    }
    .pronounce-btn:hover { background: #b08838; }
    .pronounce-btn.speaking {
      background: #b08838;
      animation: pulse-speak 0.55s ease-in-out infinite alternate;
    }
    @keyframes pulse-speak {
      from { transform: scale(1); }
      to   { transform: scale(1.18); }
    }

    .animal-name {
      flex: 1;
      font-size: 2.2rem;
      font-weight: 900;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      line-height: 1.05;
      text-align: center;
      word-break: break-word;
      padding: 0 10px;
    }
    .animal-name.name-long   { font-size: 1.75rem; }
    .animal-name.name-medium { font-size: 2.0rem; }

    .card-img-box {
      flex: 1;
      border-radius: 18px;
      overflow: hidden;
      min-height: 0;
      position: relative;
    }

    .animal-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .animal-img.pos-left   { object-position: left center; }
    .animal-img.pos-right  { object-position: right center; }
    .animal-img.pos-top    { object-position: center top; }
    .animal-img.pos-bottom { object-position: center bottom; }

    /* Back face */
    .back {
      background: #1c1917;
      transform: rotateY(180deg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 40px;
    }

    .fact-icon  { font-size: 2rem; margin-bottom: 10px; }

    .fact-label {
      font-size: 0.65rem;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-bottom: 12px;
    }

    .fact-text {
      font-size: 1rem;
      color: #fff;
      text-align: center;
      line-height: 1.65;
      font-weight: 400;
    }
  </style>
</head>
<body>

  <div class="stack-wrapper" id="stack">

    <!-- Slot D (starts as behind-3, furthest back) -->
    <div class="scene" id="scene-d">
      <div class="card" id="card-d">
        <div class="face front">
          <div class="card-top-row">
            <span class="card-icon" id="icon-d">🦕</span>
            <div class="animal-name" id="name-d"></div>
            <button class="pronounce-btn" id="pronounce-d" title="Hear pronunciation"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg></button>
          </div>
          <div class="card-img-box"><img class="animal-img" id="img-d" src="" alt="" /></div>
        </div>
        <div class="face back">
          <div class="fact-icon">💡</div>
          <div class="fact-label">Fun Fact</div>
          <div class="fact-text" id="fact-d"></div>
        </div>
      </div>
    </div>

    <!-- Slot C (starts as behind-2) -->
    <div class="scene" id="scene-c">
      <div class="card" id="card-c">
        <div class="face front">
          <div class="card-top-row">
            <span class="card-icon" id="icon-c">🦕</span>
            <div class="animal-name" id="name-c"></div>
            <button class="pronounce-btn" id="pronounce-c" title="Hear pronunciation"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg></button>
          </div>
          <div class="card-img-box"><img class="animal-img" id="img-c" src="" alt="" /></div>
        </div>
        <div class="face back">
          <div class="fact-icon">💡</div>
          <div class="fact-label">Fun Fact</div>
          <div class="fact-text" id="fact-c"></div>
        </div>
      </div>
    </div>

    <!-- Slot B (starts as behind-1) -->
    <div class="scene" id="scene-b">
      <div class="card" id="card-b">
        <div class="face front">
          <div class="card-top-row">
            <span class="card-icon" id="icon-b">🦕</span>
            <div class="animal-name" id="name-b"></div>
            <button class="pronounce-btn" id="pronounce-b" title="Hear pronunciation"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg></button>
          </div>
          <div class="card-img-box"><img class="animal-img" id="img-b" src="" alt="" /></div>
        </div>
        <div class="face back">
          <div class="fact-icon">💡</div>
          <div class="fact-label">Fun Fact</div>
          <div class="fact-text" id="fact-b"></div>
        </div>
      </div>
    </div>

    <!-- Slot A (starts as front) -->
    <div class="scene" id="scene-a">
      <div class="card" id="card-a">
        <div class="face front">
          <div class="card-top-row">
            <span class="card-icon" id="icon-a">🦕</span>
            <div class="animal-name" id="name-a"></div>
            <button class="pronounce-btn" id="pronounce-a" title="Hear pronunciation"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg></button>
          </div>
          <div class="card-img-box"><img class="animal-img" id="img-a" src="" alt="" /></div>
        </div>
        <div class="face back">
          <div class="fact-icon">💡</div>
          <div class="fact-label">Fun Fact</div>
          <div class="fact-text" id="fact-a"></div>
        </div>
      </div>
    </div>

  </div>

  <script>
    const animals = [
      { name: "Abelisaurus",        image: "images/activewild/Abelisaurus.jpg",        imgClass: "pos-left",  icon: "🦖", fact: "Abelisaurus was a large predator from Argentina with a huge skull but surprisingly tiny arms — even smaller than T. rex! It's known from just one partial skull, making it one of palaeontology's most mysterious carnivores." },
      { name: "Acrocanthosaurus",   image: "images/activewild/Acrocanthosaurus.jpg",   imgClass: "pos-left",  icon: "🦖", fact: "Acrocanthosaurus had a row of tall spines running down its back, forming a muscular ridge like a hump. One of North America's largest predators, it left behind enormous three-toed footprints still visible in Texas today." },
      { name: "Albertosaurus",      image: "images/activewild/Albertosaurus.jpg",      imgClass: "pos-left",  icon: "🦖", fact: "Albertosaurus was a smaller, faster cousin of T. rex that lived 10 million years earlier. Fossils of over 20 individuals found together suggest it may have hunted in packs — a terrifying thought!" },
      { name: "Allosaurus",         image: "images/activewild/Allosaurus.jpg",         imgClass: "pos-right", icon: "🦖", fact: "Allosaurus was the T. rex of the Jurassic — 150 million years before T. rex even existed! Its jaw could open nearly 80 degrees wide, and it may have hunted in packs to take down sauropods ten times its size." },
      { name: "Amargasaurus",       image: "images/activewild/Amargasaurus.jpg",       imgClass: "pos-left",  icon: "🦕", fact: "Amargasaurus had two dramatic rows of tall spines running down its neck and back — unique among all sauropods. Scientists still debate whether they formed a sail, a hump, or were used to make sounds to attract mates." },
      { name: "Ankylosaurus",       image: "images/activewild/Ankylosaurus.jpg",       imgClass: "pos-right", icon: "🛡️", fact: "Ankylosaurus was a living tank — its entire back was covered in thick armour plates, even its eyelids! Its solid-bone tail club could swing hard enough to shatter another dinosaur's legs." },
      { name: "Apatosaurus",        image: "images/activewild/Apatosaurus.jpg",        imgClass: "pos-left",  icon: "🦕", fact: "Apatosaurus was so massive that just one of its vertebrae was the size of a car tyre! For over 100 years it was mistakenly displayed in museums with the wrong skull — a case of prehistoric mistaken identity." },
      { name: "Archaeopteryx",      image: "images/activewild/Archaeopteryx.jpg",      imgClass: "pos-left",  icon: "🐦", fact: "Archaeopteryx is the ultimate missing link between dinosaurs and birds! It had feathers and could fly, but also had teeth, wing claws, and a long bony tail — the perfect half-dinosaur, half-bird." },
      { name: "Argentinosaurus",    image: "images/activewild/Argentinosaurus.jpg",    imgClass: "pos-left",  icon: "🦕", fact: "Argentinosaurus may be the largest animal ever to walk the Earth — up to 40 metres long and possibly 80 tonnes. Its individual vertebrae were taller than a grown adult, and each egg was about the size of a rugby ball." },
      { name: "Baryonyx",           image: "images/activewild/Baryonyx.jpg",           imgClass: "pos-left",  icon: "🦖", fact: "Baryonyx was discovered when a man out walking his dog found a huge claw in a quarry in Surrey, England! Its long crocodile-like snout and fish scales found in its stomach confirm it was a specialist fish hunter." },
      { name: "Brachiosaurus",      image: "images/activewild/Brachiosaurus.jpg",      imgClass: "pos-left",  icon: "🦕", fact: "Brachiosaurus had front legs longer than its hind legs — the opposite of most dinosaurs — giving it a giraffe-like posture. It could reach vegetation 9 metres off the ground, like a three-story building!" },
      { name: "Brontosaurus",       image: "images/activewild/Brontosaurus.jpg",       imgClass: "pos-left",  icon: "🦕", fact: "Brontosaurus was considered a myth for over a century — scientists thought it was just a misidentified Apatosaurus. Then in 2015, a detailed new study proved it was a distinct dinosaur after all, restoring its name officially!" },
      { name: "Carnotaurus",        image: "images/activewild/Carnotaurus.jpg",        imgClass: "pos-left",  icon: "🐂", fact: "Carnotaurus was possibly the fastest large predator ever — it could sprint at around 56 km/h! It also had two bull-like horns above its eyes, making it look like a dinosaur devil." },
      { name: "Ceratosaurus",       image: "images/activewild/Ceratosaurus.jpg",       imgClass: "pos-left",  icon: "🦖", fact: "Ceratosaurus had a bizarre horn on its nose — totally unique among large Jurassic predators. It coexisted with Allosaurus but was smaller and may have specialised in hunting aquatic prey like fish and crocodilians." },
      { name: "Chasmosaurus",       image: "images/activewild/Chasmosaurus.jpg",       imgClass: "pos-left",  icon: "🦕", fact: "Chasmosaurus had a frill so large relative to its body that it was mostly empty space — held up by a lattice of bone like a window frame. Scientists think the frills were brightly coloured and used to impress mates." },
      { name: "Coelophysis",        image: "images/activewild/Coelophysis.jpg",        imgClass: "pos-left",  icon: "🦖", fact: "Coelophysis is one of the earliest known dinosaurs — it appeared 228 million years ago when dinosaurs were just getting started. Hundreds of skeletons were found in a mass grave in New Mexico, possibly victims of a drought." },
      { name: "Compsognathus",      image: "images/activewild/Compsognathus.jpg",      imgClass: "pos-left",  icon: "🦎", fact: "Compsognathus was about the size of a chicken — one of the smallest dinosaurs ever found! For over a century it held the record as the tiniest known dinosaur, and it was fast enough to catch lizards on the run." },
      { name: "Corythosaurus",      image: "images/activewild/Corythosaurus.jpg",      imgClass: "pos-left",  icon: "📯", fact: "Corythosaurus wore a tall hollow crest shaped like a Corinthian warrior's helmet — that's where its name comes from. The hollow crest may have amplified its calls into a deep, resonant boom heard across the forest." },
      { name: "Deinonychus",        image: "images/activewild/Deinonychus.jpg",        imgClass: "pos-left",  icon: "🦖", fact: "Deinonychus was the real inspiration for Jurassic Park's velociraptors — the movie just renamed them! It hunted in coordinated packs, using its giant sickle claw to pin prey while its jaws did the damage." },
      { name: "Dilophosaurus",      image: "images/activewild/Dilophosaurus.jpg",      imgClass: "pos-left",  icon: "🎭", fact: "The real Dilophosaurus was twice the size of the one in Jurassic Park! There is zero fossil evidence it spat venom or had a neck frill — those were entirely made up. The filmmakers just wanted it to be scarier." },
      { name: "Diplodocus",         image: "images/activewild/Diplodocus.jpg",         imgClass: "pos-left",  icon: "🦕", fact: "Diplodocus was longer than two school buses parked end to end! Scientists think it could crack its tail like a whip so fast it broke the sound barrier — creating a dinosaur sonic boom." },
      { name: "Edmontosaurus",      image: "images/activewild/Edmontosaurus.jpg",      imgClass: "pos-left",  icon: "🦎", fact: "Edmontosaurus had hundreds of tightly packed teeth that worked like a grinding mill — perfect for chewing tough plants. A mummified specimen was found so well preserved that scientists could see its wrinkled skin and last meal!" },
      { name: "Gallimimus",         image: "images/activewild/Gallimimus.jpg",         imgClass: "pos-left",  icon: "🐦", fact: "Gallimimus was built for pure speed — long legs, hollow bones, and a lightweight body let it sprint like an ostrich at over 50 km/h. Despite its fierce look in Jurassic Park, it had no teeth and probably ate plants and insects." },
      { name: "Giganotosaurus",     image: "images/activewild/Giganotosaurus.jpg",     imgClass: "pos-left",  icon: "🦖", fact: "Giganotosaurus from Argentina may have been slightly longer than T. rex, making it one of the biggest land predators ever. Its brain was shaped like a banana — it wasn't smart, but it didn't need to be to hunt giant sauropods." },
      { name: "Gorgosaurus",        image: "images/activewild/Gorgosaurus.jpg",        imgClass: "pos-left",  icon: "🦖", fact: "Gorgosaurus was a tyrannosaur that hunted hadrosaurs 76 million years ago in what is now Canada. A remarkable fossil shows a Gorgosaurus with two baby dinosaurs in its stomach — its last meal, preserved forever." },
      { name: "Herrerasaurus",      image: "images/activewild/Herrerasaurus.jpg",      imgClass: "pos-left",  icon: "🦖", fact: "Herrerasaurus is one of the oldest known dinosaurs, stalking the Earth 231 million years ago when dinosaurs were rare newcomers. It was a fast, agile predator — a glimpse of what the very first meat-eaters looked like." },
      { name: "Iguanodon",          image: "images/activewild/Iguanodon.jpg",          imgClass: "pos-left",  icon: "🦎", fact: "Iguanodon was one of the very first dinosaurs ever discovered. Scientists were so confused by its spiked thumb bone they glued it onto its nose like a rhino horn — an embarrassing mistake that lasted years!" },
      { name: "Kentrosaurus",       image: "images/activewild/Kentrosaurus.jpg",       imgClass: "pos-left",  icon: "🛡️", fact: "Kentrosaurus was the African cousin of Stegosaurus, but even spikier — the back half of its body was covered in long sharp spikes. It could swing its spiked tail at 45 km/h, enough to seriously injure an Allosaurus." },
      { name: "Lambeosaurus",       image: "images/activewild/Lambeosaurus.jpg",       imgClass: "pos-left",  icon: "📯", fact: "Lambeosaurus had a spectacular hatchet-shaped hollow crest on its head used to honk loud calls through the forest. It was one of the largest hadrosaurs ever found, stretching up to 15 metres long." },
      { name: "Leaellynasaura",     image: "images/activewild/Leaellynasaura.jpg",     imgClass: "pos-left",  icon: "🌿", fact: "Leaellynasaura lived inside the Antarctic Circle during the Cretaceous, surviving months of total winter darkness. It had enormous eyes relative to its skull — possibly an adaptation for seeing in the long polar night." },
      { name: "Maiasaura",          image: "images/activewild/Maiasaura.jpg",          imgClass: "pos-left",  icon: "🥚", fact: "Maiasaura means 'good mother lizard' — fossils show it built nests, laid eggs in colonies, and brought food to its young, just like birds do today. It was the first dinosaur proven to have cared for its babies after hatching!" },
      { name: "Megalosaurus",       image: "images/activewild/Megalosaurus.jpg",       imgClass: "pos-left",  icon: "🦖", fact: "Megalosaurus was the very first dinosaur ever given an official scientific name, back in 1824. Scientists were so baffled by its giant thigh bone that they initially thought it belonged to a biblical giant!" },
      { name: "Minmi",              image: "images/activewild/Minmi.jpg",              imgClass: "pos-left",  icon: "🛡️", fact: "Minmi was a tiny armoured dinosaur from Australia — so small it could fit under a dining table. Remarkably, scientists found its last meal still preserved inside its stomach: a mix of fruits, seeds, and finely chopped plants." },
      { name: "Ornithomimus",       image: "images/activewild/Ornithomimus.jpg",       imgClass: "pos-left",  icon: "🐦", fact: "Ornithomimus means 'bird mimic' and it really earned the name — it looked almost exactly like a large ostrich with a toothless beak and powerful running legs. Fossils show it had a feathered body and fuzzy arms!" },
      { name: "Oviraptor",          image: "images/activewild/Oviraptor.jpg",          imgClass: "pos-left",  icon: "🥚", fact: "Oviraptor means 'egg thief' — but it was completely innocent! The skeleton found near eggs was actually sitting on its OWN nest, keeping them warm like a bird, not stealing from anyone." },
      { name: "Pachycephalosaurus", image: "images/activewild/Pachycephalosaurus.jpg", imgClass: "pos-left",  icon: "💀", fact: "Pachycephalosaurus had a dome skull up to 25 cm thick — like wearing a bowling ball as a hat. Scientists are still arguing about whether it headbutted rivals or just used its head for show." },
      { name: "Parasaurolophus",    image: "images/activewild/Parasaurolophus.jpg",    imgClass: "pos-left",  icon: "📯", fact: "The long hollow crest on Parasaurolophus worked like a trombone! Scientists have recreated its call — a deep, haunting moan that could travel for kilometres through prehistoric forests." },
      { name: "Plateosaurus",       image: "images/activewild/Plateosaurus.jpg",       imgClass: "pos-left",  icon: "🦕", fact: "Plateosaurus was one of the first large dinosaurs, appearing 214 million years ago in what is now Europe. It could walk on two legs or four, and fossils have been found at dozens of sites across Germany, France, and Switzerland." },
      { name: "Protoceratops",      image: "images/activewild/Protoceratops.jpg",      imgClass: "pos-left",  icon: "🦕", fact: "Protoceratops may be the source of the ancient griffin legend — its beaked skull and four-legged skeleton found in the Gobi Desert could easily have inspired stories of a lion-eagle hybrid guarding gold. Myth solved!" },
      { name: "Spinosaurus",        image: "images/activewild/Spinosaurus.jpg",        imgClass: "pos-left",  icon: "🦖", fact: "Spinosaurus was bigger than T. rex and could swim! Its sail-like back spines stood as tall as a person, and it had crocodile-like jaws built for snatching fish straight out of the water." },
      { name: "Stegoceras",         image: "images/activewild/Stegoceras.jpg",         imgClass: "pos-left",  icon: "💀", fact: "Stegoceras was a small dome-headed dinosaur about the size of a goat that headbutted rivals like bighorn sheep do today. Its thick skull was surrounded by bumpy knobs — making it look like it wore a bony crown." },
      { name: "Stegosaurus",        image: "images/activewild/Stegosaurus.jpg",        imgClass: "pos-left",  icon: "🛡️", fact: "Stegosaurus had a brain the size of a walnut — one of the smallest brain-to-body ratios ever. Its tail spikes were so deadly palaeontologists named them the 'thagomizer' after a Far Side cartoon." },
      { name: "Stenonychosaurus",   image: "images/activewild/Stenonychosaurus.jpg",   imgClass: "pos-left",  icon: "🧠", fact: "Stenonychosaurus had the largest brain relative to body size of any known dinosaur, making it possibly the smartest. Its forward-facing eyes gave it excellent depth perception — perfect for hunting at dusk." },
      { name: "Suchomimus",         image: "images/activewild/Suchomimus.jpg",         imgClass: "pos-left",  icon: "🦖", fact: "Suchomimus means 'crocodile mimic' — it had a 1-metre-long skull shaped almost identically to a crocodile's, packed with over 100 teeth pointing backwards to grip slippery fish. It waded through African rivers 112 million years ago." },
      { name: "Tarbosaurus",        image: "images/activewild/Tarbosaurus.jpg",        imgClass: "pos-left",  icon: "🦖", fact: "Tarbosaurus was the Asian equivalent of T. rex, stalking the forests of Mongolia 70 million years ago. It was slightly smaller than its famous cousin but just as fearsome, with massive jaws and the same comically tiny arms." },
      { name: "Therizinosaurus",    image: "images/activewild/Therizinosaurus.jpg",    imgClass: "pos-left",  icon: "✂️", fact: "Therizinosaurus had the longest claws of any animal ever — up to a meter long, like giant garden rakes. Despite looking terrifying, this enormous dinosaur was a gentle vegetarian!" },
      { name: "Triceratops",        image: "images/activewild/Triceratops.jpg",        imgClass: "pos-left",  icon: "🦕", fact: "Triceratops had a skull the size of a car hood — one of the largest heads of any land animal ever! Its three horns could grow a meter long, and it used them to fight T. rex face to face." },
      { name: "Troodon",            image: "images/activewild/Troodon.jpg",            imgClass: "pos-left",  icon: "🧠", fact: "Troodon was considered the most intelligent dinosaur — its brain was proportionally larger than most living reptiles today. Some scientists have speculated that if the asteroid hadn't hit, its descendants might eventually have evolved remarkable intelligence." },
      { name: "Tyrannosaurus",      image: "images/activewild/Tyrannosaurus.jpg",      imgClass: "pos-left",  icon: "🦖", fact: "T. rex had 60 banana-sized teeth and the most powerful bite of any land animal ever — but its arms were so tiny it couldn't even reach its own mouth! Scientists now think it may have been covered in feathers." },
      { name: "Utahraptor",         image: "images/activewild/Utahraptor.jpg",         imgClass: "pos-left",  icon: "🦖", fact: "Utahraptor was the real giant version of a raptor — up to 7 metres long and 500 kg, far more terrifying than anything in Jurassic Park. Its sickle claw was 35 cm long and could disembowel prey in a single kick." },
      { name: "Velociraptor",       image: "images/activewild/Velociraptor.jpg",       imgClass: "pos-left",  icon: "🦖", fact: "Real velociraptors were only the size of a turkey and covered in feathers — far less scary than the movies! They may have used their famous sickle claw to pin prey, not slash it." },
    ];

    const N = animals.length;
    const wrap = i => ((i % N) + N) % N;

    // Y offsets and opacities per position index
    const OFFSETS  = [0, 6, 12, 18];       // translateY px per position
    const OPACITIES = ['1', '0.82', '0.56', '0']; // pos 3 starts invisible
    const Z_IDX     = ['4', '3', '2', '1'];

    const SLOTS = ['a', 'b', 'c', 'd'];
    const slots = {};
    SLOTS.forEach(k => {
      slots[k] = {
        scene:        document.getElementById(`scene-${k}`),
        card:         document.getElementById(`card-${k}`),
        img:          document.getElementById(`img-${k}`),
        name:         document.getElementById(`name-${k}`),
        icon:         document.getElementById(`icon-${k}`),
        fact:         document.getElementById(`fact-${k}`),
        pronounceBtn: document.getElementById(`pronounce-${k}`),
        tilt:         0,   // persistent tilt angle in degrees
        animalIdx:    0,   // which animal is currently loaded in this slot
      };
    });

    // positions[i] = which slot key is at position i (0=front … 3=furthest behind)
    let positions = ['a', 'b', 'c', 'd'];
    let current   = 0;
    let isAnimating = false;

    // Random tilt: 3–8 deg, always has a direction (never near 0)
    function randomTilt() {
      const mag = 3 + Math.random() * 5;
      return (Math.random() < 0.5 ? -1 : 1) * mag;
    }

    function setScene(key, tilt, posIdx, transition = 'none') {
      const s = slots[key].scene;
      s.style.transition = transition;
      s.style.transform  = `rotate(${tilt}deg) translateY(${OFFSETS[posIdx]}px)`;
      s.style.opacity    = OPACITIES[posIdx];
      s.style.zIndex     = Z_IDX[posIdx];
    }

    function loadSlot(key, animalIdx) {
      const a  = animals[animalIdx];
      const sl = slots[key];
      sl.animalIdx        = animalIdx;
      sl.img.src          = a.image + '?v=' + animalIdx;
      sl.img.className    = 'animal-img' + (a.imgClass ? ' ' + a.imgClass : '');
      sl.img.alt          = a.name;
      sl.name.textContent = a.name;
      sl.name.className   = 'animal-name' + (a.name.length > 13 ? ' name-long' : a.name.length > 9 ? ' name-medium' : '');
      sl.icon.textContent = a.icon || '🦖';
      sl.fact.textContent = a.fact;
    }

    function goTo(nextIdx) {
      if (isAnimating) return;
      isAnimating = true;
      current = nextIdx;

      const EASE_DROP = 'transform 0.40s cubic-bezier(0.55,0,1,0.7), opacity 0.28s ease';
      const EASE_RISE = 'transform 0.44s cubic-bezier(0.18,0,0.35,1), opacity 0.36s ease';

      // Unflip the departing front card
      slots[positions[0]].card.classList.remove('flipped');

      // 1. Front card drops away
      const s0 = slots[positions[0]].scene;
      s0.style.transition = EASE_DROP;
      s0.style.transform  = 'translateY(115%) rotate(6deg)';
      s0.style.opacity    = '0';

      // 2. behind-1 → front: animate its tilt to 0 (straighten)
      setScene(positions[1], 0, 0, EASE_RISE);

      // 3. behind-2 → behind-1: keeps its tilt, just moves up + more opaque
      setScene(positions[2], slots[positions[2]].tilt, 1, EASE_RISE);

      // 4. behind-3 → behind-2: keeps its tilt, FADES IN (was opacity 0)
      setScene(positions[3], slots[positions[3]].tilt, 2, EASE_RISE);

      setTimeout(() => {
        const dropped = positions.shift();
        positions.push(dropped);

        // Dropped card: new random tilt, snap to behind-3 (invisible), load next animal
        const newTilt = randomTilt();
        slots[dropped].tilt = newTilt;
        slots[dropped].card.classList.remove('flipped');
        setScene(dropped, newTilt, 3); // instant, opacity 0
        loadSlot(dropped, wrap(current + 3));

        // Mark new front's tilt as 0
        slots[positions[0]].tilt = 0;

        // Clear transitions so CSS card-flip works normally
        positions.forEach(k => { slots[k].scene.style.transition = ''; });

        isAnimating = false;
      }, 450);
    }

    // Speak a dinosaur name aloud using the Web Speech API
    function speakDino(key) {
      if (!window.speechSynthesis) return;
      const a    = animals[slots[key].animalIdx];
      const text = a.name;
      const btn  = slots[key].pronounceBtn;

      window.speechSynthesis.cancel();
      const u   = new SpeechSynthesisUtterance(text);
      u.rate    = 0.82;
      u.pitch   = 1.0;
      u.onstart = () => btn.classList.add('speaking');
      u.onend   = () => btn.classList.remove('speaking');
      u.onerror = () => btn.classList.remove('speaking');
      window.speechSynthesis.speak(u);
    }

    // Click / flip wiring for all slots
    let wasDrag = false; // suppress click-to-flip when a drag just ended
    SLOTS.forEach(k => {
      slots[k].card.addEventListener('click', e => {
        if (positions[0] !== k) return;
        if (wasDrag) return;
        if (!e.target.closest('.pronounce-btn')) slots[k].card.classList.toggle('flipped');
      });
      slots[k].pronounceBtn.addEventListener('click', e => {
        e.stopPropagation();
        if (positions[0] !== k) return;
        speakDino(k);
      });
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight') goTo(wrap(current + 1));
      if (e.key === 'ArrowLeft')  goTo(wrap(current - 1));
      if (e.key === ' ' || e.key === 'Enter') slots[positions[0]].card.classList.toggle('flipped');
    });

    // ── Drag to dismiss ─────────────────────────────────────────────────────────
    let dragStartX = 0, dragStartY = 0;
    let dragActive = false; // true once finger has moved enough to start drag
    let dragSlotKey = null; // which slot is being dragged
    let dragDx = 0, dragDy = 0;

    const DISMISS_THRESHOLD = 100; // px horizontal to trigger dismiss

    document.addEventListener('touchstart', e => {
      if (isAnimating) return;
      dragStartX  = e.touches[0].clientX;
      dragStartY  = e.touches[0].clientY;
      dragActive  = false;
      dragDx = 0; dragDy = 0;
      dragSlotKey = positions[0];
    }, { passive: true });

    document.addEventListener('touchmove', e => {
      if (isAnimating || !dragSlotKey) return;
      const dx = e.touches[0].clientX - dragStartX;
      const dy = e.touches[0].clientY - dragStartY;

      if (!dragActive) {
        if (Math.hypot(dx, dy) < 6) return; // wait for real movement
        dragActive = true;
      }

      dragDx = dx;
      dragDy = dy;

      // Card follows finger: tilts in drag direction, slight vertical follow
      const rotate = (dx / 200) * 18;
      const s = slots[dragSlotKey].scene;
      s.style.transition = 'none';
      s.style.transform  = `translate(${dx}px, ${dy * 0.3}px) rotate(${rotate}deg)`;
      s.style.zIndex     = '10'; // stay above other cards while dragging

      e.preventDefault(); // prevent browser scroll / rubber-band
    }, { passive: false });

    document.addEventListener('touchend', () => {
      if (!dragActive || !dragSlotKey) {
        dragSlotKey = null;
        return;
      }
      dragActive = false;

      const dx  = dragDx;
      const dy  = dragDy;
      const key = dragSlotKey;
      dragSlotKey = null;

      // Suppress the click event that fires immediately after touchend
      if (Math.abs(dx) > 8) {
        wasDrag = true;
        setTimeout(() => { wasDrag = false; }, 100);
      }

      if (Math.abs(dx) > DISMISS_THRESHOLD) {
        // ── Dismiss: fly the card off-screen, then cycle the deck ──────────────
        isAnimating = true;
        current = wrap(current + 1);

        const dir = dx > 0 ? 1 : -1;
        const s0  = slots[key].scene;
        s0.style.transition = 'transform 0.35s cubic-bezier(0.55,0,1,0.7), opacity 0.25s ease';
        s0.style.transform  = `translate(${dir * window.innerWidth * 1.3}px, ${dy * 0.3}px) rotate(${dir * 25}deg)`;
        s0.style.opacity    = '0';
        s0.style.zIndex     = Z_IDX[0];
        slots[key].card.classList.remove('flipped');

        // Rise the behind cards at the same moment
        const EASE_RISE = 'transform 0.44s cubic-bezier(0.18,0,0.35,1), opacity 0.36s ease';
        setScene(positions[1], 0,                      0, EASE_RISE);
        setScene(positions[2], slots[positions[2]].tilt, 1, EASE_RISE);
        setScene(positions[3], slots[positions[3]].tilt, 2, EASE_RISE);

        setTimeout(() => {
          const dropped = positions.shift();
          positions.push(dropped);
          const newTilt = randomTilt();
          slots[dropped].tilt = newTilt;
          slots[dropped].card.classList.remove('flipped');
          setScene(dropped, newTilt, 3);
          loadSlot(dropped, wrap(current + 3));
          slots[positions[0]].tilt = 0;
          positions.forEach(k => { slots[k].scene.style.transition = ''; });
          isAnimating = false;
        }, 450);

      } else {
        // ── Snap back with a springy feel ──────────────────────────────────────
        const s = slots[key].scene;
        s.style.transition = 'transform 0.4s cubic-bezier(0.34,1.56,0.64,1)';
        s.style.transform  = `rotate(0deg) translateY(0px)`;
        s.style.zIndex     = Z_IDX[0];
      }
    }, { passive: true });

    // ── Initial setup ──────────────────────────────────────────────────────────
    // Front (pos 0) is straight; pos 1–3 get random tilts; pos 3 is invisible
    positions.forEach((k, i) => {
      const tilt = (i === 0) ? 0 : randomTilt();
      slots[k].tilt = tilt;
      setScene(k, tilt, i); // instant, no transition
      loadSlot(k, wrap(i));
    });
  </script>
</body>
</html>
